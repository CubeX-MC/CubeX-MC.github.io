<title>CubeX 存档合并</title>
<style>

input[type="search"] { width: 190px; color: #fff; outline: none; }
input[type="search"]::placeholder { color: rgba(212,205,196,.45); }
.dot { width: 10px; height: 10px; display: inline-block; }
.zm1 { background: #c9a84c; }
.zm2 { background: #6b8fb0; }
.readout { position: fixed; left: 12px; bottom: 12px; max-width: calc(100vw - 24px); padding: 8px 10px; background: rgba(8, 7, 4, .86); border: 1px solid rgba(255,255,255,.07); color: #d4cdc4; backdrop-filter: blur(12px); }
.search { position: relative; display: inline-flex; gap: 6px; align-items: center; }
.suggestions { position: absolute; top: calc(100% + 7px); left: 0; width: min(380px, calc(100vw - 24px)); max-height: 280px; overflow: auto; background: rgba(8, 7, 4, .96); border: 1px solid rgba(255,255,255,.10); box-shadow: 0 12px 28px rgba(0,0,0,.45); display: none; }
.suggestions.open { display: block; }
.suggestions button { width: 100%; height: auto; min-height: 42px; display: grid; grid-template-columns: 1fr auto; gap: 4px 12px; align-items: center; border: 0; border-bottom: 1px solid rgba(255,255,255,.06); background: transparent; padding: 7px 9px; text-align: left; }
.suggestions button:last-child { border-bottom: 0; }
.suggestions button:hover, .suggestions button.active { background: rgba(160,82,45,.18); color: #fff; }
.suggestion-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.suggestion-meta { color: rgba(212,205,196,.45); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

const canvas = document.getElementById('map');

const claimSearchButton = document.getElementById('claimSearchGo');
const claimSuggestions = document.getElementById('claimSuggestions');
const tiles = TILES.map(([rx, rz]) => ({
  rx,
  rz,
  x1: rx * 512,
  x2: (rx + 1) * 512,
  z1: rz * 512,
  z2: (rz + 1) * 512
}));
const imageCache = new Map();
let viewX = (META.claim_bounds[0] + META.claim_bounds[1]) / 2;
let viewZ = (META.claim_bounds[2] + META.claim_bounds[3]) / 2;
let scale = 1;
let dragging = false;
let lastMouse = null;
let hoverClaim = null;
let drawPending = false;
let didInitialFit = false;
let selectedClaim = null;
let currentSearchMatches = [];
let activeSearchIndex = 0;
const state = { zm1: true, zm2: true, labels: false };
const claimSearchIndex = CLAIMS.map((claim, index) => {
  const shortName = claim.name.replace(/^zm1[_-]?/i, '');
  return {
    claim,
    index,
    label: formatClaimLabel(claim),
    nameKey: normalizeSearch(claim.name),
    shortNameKey: normalizeSearch(shortName),
    areaKey: normalizeSearch(claim.area),
    groupKey: normalizeSearch(claim.group),
    fullKey: normalizeSearch(`${claim.group} ${claim.area} ${claim.name} ${claim.x1} ${claim.z1} ${claim.x2} ${claim.z2}`)
  };
});

function normalizeSearch(value) {
  return String(value ?? '')
    .normalize('NFKC')
    .toLowerCase()
    .replace(/[\s:_./\\-]+/g, '');
}

function formatClaimLabel(c) {
  const area = c.area && c.area !== 'main' ? ` / ${c.area}` : '';
  return `${c.group}${area}: ${c.name}`;
}

function formatClaimMeta(c) {
  const cx = Math.floor((c.x1 + c.x2) / 2);
  const cz = Math.floor((c.z1 + c.z2) / 2);
  return `x ${cx}, z ${cz}`;
}

function subsequenceScore(text, query) {
  let last = -1;
  let gap = 0;
  for (const char of query) {
    const at = text.indexOf(char, last + 1);
    if (at === -1) return Infinity;
    gap += at - last - 1;
    last = at;
  }
  return gap + text.length / 1000;
}

function textScore(text, query, base) {
  if (!text) return Infinity;
  if (text === query) return base;
  if (text.startsWith(query)) return base + 10 + (text.length - query.length) / 1000;
  const at = text.indexOf(query);
  if (at !== -1) return base + 30 + at;
  const fuzzy = subsequenceScore(text, query);
  return Number.isFinite(fuzzy) ? base + 80 + fuzzy : Infinity;
}

function scoreClaimMatch(item, query) {
  return Math.min(
    textScore(item.nameKey, query, 0),
    textScore(item.shortNameKey, query, 2),
    textScore(item.fullKey, query, 20),
    textScore(item.areaKey, query, 45),
    textScore(item.groupKey, query, 60)
  );
}

function findClaimMatches(query, limit = 8) {
  const key = normalizeSearch(query);
  if (!key) return [];
  return claimSearchIndex
    .map(item => ({ item, score: scoreClaimMatch(item, key) }))
    .filter(result => Number.isFinite(result.score))
    .sort((a, b) => a.score - b.score || a.item.label.localeCompare(b.item.label, 'zh-CN') || a.item.index - b.item.index)
    .slice(0, limit)
    .map(result => result.item);
}

function setSearchOpen(open) {
  claimSuggestions.classList.toggle('open', open);
  claimSearchInput.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function setActiveSearchIndex(index) {
  activeSearchIndex = Math.max(0, Math.min(index, currentSearchMatches.length - 1));
  claimSuggestions.querySelectorAll('button').forEach((button, i) => {
    button.classList.toggle('active', i === activeSearchIndex);
    button.setAttribute('aria-selected', i === activeSearchIndex ? 'true' : 'false');
  });
}

function renderSearchResults(matches) {
  currentSearchMatches = matches;
  activeSearchIndex = 0;
  claimSuggestions.replaceChildren();
  if (!claimSearchInput.value.trim()) {
    setSearchOpen(false);
    return;
  }
  if (!matches.length) {
    const empty = document.createElement('div');
    empty.className = 'suggestion-empty';
    empty.textContent = '无匹配领地';
    claimSuggestions.append(empty);
    setSearchOpen(true);
    return;
  }
  matches.forEach((item, index) => {
    const option = document.createElement('button');
    option.type = 'button';
    option.setAttribute('role', 'option');
    const title = document.createElement('span');
    title.className = 'suggestion-title';
    title.textContent = item.label;
    const meta = document.createElement('span');
    meta.className = 'suggestion-meta';
    meta.textContent = formatClaimMeta(item.claim);
    option.append(title, meta);
    option.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      selectSearchMatch(index);
    });
    claimSuggestions.append(option);
  });
  setSearchOpen(true);
  setActiveSearchIndex(0);
}

function refreshSearchResults() {
  renderSearchResults(findClaimMatches(claimSearchInput.value));
}

function hideSearchResults() {
  setSearchOpen(false);
}

function selectSearchMatch(index) {
  const item = currentSearchMatches[index];
  if (!item) return;
  claimSearchInput.value = item.label;
  hideSearchResults();
  focusClaim(item.claim);
}

function locateBestClaim() {
  const matches = findClaimMatches(claimSearchInput.value);
  renderSearchResults(matches);
  if (matches.length) selectSearchMatch(Math.min(activeSearchIndex, matches.length - 1));
}

function focusClaim(c) {
  selectedClaim = c;
  hoverClaim = c;
  viewX = (c.x1 + c.x2) / 2;
  viewZ = (c.z1 + c.z2) / 2;
  scale = 1;
  if (c.group === 'zm1') {
    state.zm1 = true;
    document.getElementById('showZm1').checked = true;
  }
  if (c.group === 'zm2') {
    state.zm2 = true;
    document.getElementById('showZm2').checked = true;
  }
  requestDraw();
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(innerWidth * dpr));
  canvas.height = Math.max(1, Math.floor(innerHeight * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (!didInitialFit) {
    fitBounds(META.claim_bounds, false);
    didInitialFit = true;
  }
  requestDraw();
}

function worldToScreenX(x) { return (x - viewX) * scale + innerWidth / 2; }
function worldToScreenZ(z) { return (z - viewZ) * scale + innerHeight / 2; }
function screenToWorldX(x) { return (x - innerWidth / 2) / scale + viewX; }
function screenToWorldZ(y) { return (y - innerHeight / 2) / scale + viewZ; }

function fitBounds(bounds, redraw = true) {
  const width = Math.max(1, bounds[1] - bounds[0]);
  const height = Math.max(1, bounds[3] - bounds[2]);
  viewX = (bounds[0] + bounds[1]) / 2;
  viewZ = (bounds[2] + bounds[3]) / 2;
  scale = Math.min(innerWidth / width, innerHeight / height) * 0.88;
  scale = Math.max(0.00002, Math.min(32, scale));
  if (redraw) requestDraw();
}

function getImage(rx, rz) {
  const key = `${rx},${rz}`;
  let img = imageCache.get(key);
  if (!img) {
    img = new Image();
    img.decoding = 'async';
    img.onload = requestDraw;
    img.src = `tiles/r.${rx}.${rz}.png`;
    imageCache.set(key, img);
  }
  return img;
}

function visibleWorldBounds(padScreen = 0) {
  return {
    left: screenToWorldX(-padScreen),
    right: screenToWorldX(innerWidth + padScreen),
    top: screenToWorldZ(-padScreen),
    bottom: screenToWorldZ(innerHeight + padScreen)
  };
}

function claimEnabled(c) {
  if (c.group === 'zm1' && !state.zm1) return false;
  if (c.group === 'zm2' && !state.zm2) return false;
  return true;
}

function rectVisible(rect, bounds) {
  return rect.x2 >= bounds.left && rect.x1 <= bounds.right && rect.z2 >= bounds.top && rect.z1 <= bounds.bottom;
}

function drawTiles() {
  const bounds = visibleWorldBounds(4);
  const tileScreen = 512 * scale;
  ctx.imageSmoothingEnabled = false;
  for (const tile of tiles) {
    if (!rectVisible(tile, bounds)) continue;
    const sx = worldToScreenX(tile.x1);
    const sy = worldToScreenZ(tile.z1);
    if (tileScreen < 5) {
      ctx.fillStyle = '#16130f';
      ctx.fillRect(sx, sy, Math.max(1, tileScreen), Math.max(1, tileScreen));
      continue;
    }
    const img = getImage(tile.rx, tile.rz);
    if (img.complete && img.naturalWidth) {
      ctx.drawImage(img, sx, sy, tileScreen, tileScreen);
    } else {
      ctx.fillStyle = '#120f0b';
      ctx.fillRect(sx, sy, tileScreen, tileScreen);
    }
  }
}

function drawClaims() {
  const bounds = visibleWorldBounds();
  ctx.lineJoin = 'miter';
  ctx.font = '12px system-ui, sans-serif';
  for (const c of CLAIMS) {
    if (!claimEnabled(c) || !rectVisible(c, bounds)) continue;
    const isSelected = c === selectedClaim;
    const sx = worldToScreenX(c.x1);
    const sy = worldToScreenZ(c.z1);
    const sw = Math.max(1, (c.x2 - c.x1) * scale);
    const sh = Math.max(1, (c.z2 - c.z1) * scale);
    const color = c.group === 'zm1' ? '#c9a84c' : '#6b8fb0';
    ctx.strokeStyle = color;
    ctx.fillStyle = c.group === 'zm1' ? 'rgba(201,168,76,.10)' : 'rgba(107,143,176,.10)';
    ctx.lineWidth = Math.max(1.25, Math.min(4, 2.2 / Math.sqrt(Math.max(scale, 0.001))));
    if (scale > 0.02) ctx.fillRect(sx, sy, sw, sh);
    ctx.strokeRect(sx, sy, sw, sh);
    if (isSelected) {
      ctx.save();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = Math.max(2, Math.min(6, 3 / Math.sqrt(Math.max(scale, 0.001))));
      ctx.strokeRect(sx - 2, sy - 2, sw + 4, sh + 4);
      ctx.restore();
    }
    if ((state.labels || isSelected) && scale > 0.08 && (isSelected || (sw > 24 && sh > 12))) {
      ctx.fillStyle = color;
      ctx.fillText(c.name, sx + 3, sy + 13);
    }
  }
}

function updateReadout(mouse) {
  const zoom = scale >= 1 ? `${scale.toFixed(2)}x` : `${(scale * 100).toFixed(2)}%`;
  let text = `x ${Math.floor(screenToWorldX(mouse?.x ?? innerWidth / 2))}, z ${Math.floor(screenToWorldZ(mouse?.y ?? innerHeight / 2))} | ${zoom} | tiles ${META.tile_count} | zm1 ${META.claim_stats.areas.zm1}, zm2 ${META.claim_stats.areas.zm2}`;
  if (hoverClaim) text += ` | ${hoverClaim.group}: ${hoverClaim.name}`;
  if (selectedClaim && selectedClaim !== hoverClaim) text += ` | 选中 ${formatClaimLabel(selectedClaim)}`;
  readout.textContent = text;
}

function drawFrame() {
  drawPending = false;
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  drawTiles();
  drawClaims();
  updateReadout(lastMouse);
}

function requestDraw() {
  if (drawPending) return;
  drawPending = true;
  requestAnimationFrame(drawFrame);
}

function findHover(mouse) {
  if (!mouse) return null;
  const x = screenToWorldX(mouse.x);
  const z = screenToWorldZ(mouse.y);
  for (let i = CLAIMS.length - 1; i >= 0; i--) {
    const c = CLAIMS[i];
    if (!claimEnabled(c)) continue;
    if (x >= c.x1 && x <= c.x2 && z >= c.z1 && z <= c.z2) return c;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  dragging = true;
  canvas.classList.add('dragging');
  lastMouse = { x: e.clientX, y: e.clientY };
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  const now = { x: e.clientX, y: e.clientY };
  if (dragging && lastMouse) {
    viewX -= (now.x - lastMouse.x) / scale;
    viewZ -= (now.y - lastMouse.y) / scale;
  }
  lastMouse = now;
  hoverClaim = dragging ? null : findHover(lastMouse);
  requestDraw();
});
canvas.addEventListener('pointerup', e => {
  dragging = false;
  canvas.classList.remove('dragging');
  canvas.releasePointerCapture(e.pointerId);
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const beforeX = screenToWorldX(e.clientX);
  const beforeZ = screenToWorldZ(e.clientY);
  const factor = Math.exp(-e.deltaY * 0.0015);
  scale = Math.max(0.00002, Math.min(32, scale * factor));
  const afterX = screenToWorldX(e.clientX);
  const afterZ = screenToWorldZ(e.clientY);
  viewX += beforeX - afterX;
  viewZ += beforeZ - afterZ;
  requestDraw();
}, { passive: false });

claimSearchInput.addEventListener('input', refreshSearchResults);
claimSearchInput.addEventListener('focus', () => {
  if (claimSearchInput.value.trim()) refreshSearchResults();
});
claimSearchInput.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!currentSearchMatches.length) refreshSearchResults();
    setActiveSearchIndex(activeSearchIndex + 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    setActiveSearchIndex(activeSearchIndex - 1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    locateBestClaim();
  } else if (e.key === 'Escape') {
    hideSearchResults();
  }
});
claimSearchButton.addEventListener('click', locateBestClaim);
document.addEventListener('pointerdown', e => {
  if (!claimSearchBox.contains(e.target)) hideSearchResults();
});

document.getElementById('fitClaims').onclick = () => fitBounds(META.claim_bounds);
document.getElementById('fitWorld').onclick = () => fitBounds(META.world_bounds);
document.getElementById('oneToOne').onclick = () => { scale = 1; requestDraw(); };
document.getElementById('showZm1').onchange = e => { state.zm1 = e.target.checked; requestDraw(); };
document.getElementById('showZm2').onchange = e => { state.zm2 = e.target.checked; requestDraw(); };
document.getElementById('showLabels').onchange = e => { state.labels = e.target.checked; requestDraw(); };
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
