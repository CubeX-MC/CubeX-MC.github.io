name: Deploy Firestore rules

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-firestore-rules.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Write Firebase credentials
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy rules
        run: npx --yes firebase-tools@latest deploy --only firestore:rules --project cubex-chat --non-interactive
